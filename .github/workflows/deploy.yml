name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Auto Versioning (Local Only)
        id: versioning
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VER=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "Bumping to v$NEW_VER"

      - name: Build Application
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_APP_VERSION: ${{ steps.versioning.outputs.new_version }}
        run: pnpm build

      - name: Generate Deployment Metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=orenotokusatsu --branch=main --commit-hash=${{ steps.meta.outputs.sha_short }} --commit-message="Release v${{ steps.versioning.outputs.new_version }}"

      - name: Finalize & Push Version
        if: success()
        run: |
          git add package.json
          git commit -m "chore: bump version to v${{ steps.versioning.outputs.new_version }} [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
